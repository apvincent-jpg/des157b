<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time on the Trail</title>
    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">
    <script src="scripts.js" defer></script>
</head>

<body>
    <header>
        <h1>CHECK YOURSELF</h1>
        <h2> outdoor hiking mileage log </h2>
    </header>

    <main>
        <div class="chart">
            <!-- <img class="grid" src="images/grid.png" ; alt="grid"> -->

            <!-- <h3 class="miles">MILES</h3> -->

            <section class="monthNames">
                <p>september</p>
                <p>october</p>
                <p>november</p>
                <p>december</p>
                <p>january</p>
                <p>february</p>
                <p>march</p>
                <p>april</p>
            </section>

            <section class="triangles">

                <div class="tri">
                    <img id="redTri" src="images/triangle1.png" alt="triangle">
                </div>

                <div class="tri">
                    <img id="greenTri" src="images/triangle2.png" alt="triangle">
                </div>

                <div class="tri">
                    <img id="blueTri" src="images/triangle3.png" alt="triangle">
                </div>

                <div class="tri">
                    <img id="orangeTri" src="images/triangle4.png" alt="triangle">
                </div>

                <div class="tri">
                    <img id="yellowTri" src="images/triangle5.png" alt="triangle">
                </div>

                <div class="tri">
                    <img id="limeTri" src="images/triangle6.png" alt="triangle">
                </div>

                <div class="tri">
                    <img id="pinkTri" src="images/triangle7.png" alt="triangle">
                </div>

                <div class="tri">
                    <img id="lightTri" src="images/triangle8.png" alt="triangle">
                </div>

            </section>

            <!-- <h3 class="month">MONTH</h3> -->
        </div>

        <section class="circles">
            <img id="redCir" src="images/circle1.png"  alt="cir1">
            <img id="greenCir" src="images/circle2.png"  alt="cir2">
            <img id="blueCir" src="images/circle3.png" alt="cir3">
            <img id="orangeCir" src="images/circle4.png" alt="cir4">
            <img id="yellowCir" src="images/circle5.png" alt="cir5">
            <img id="limeCir" src="images/circle6.png" alt="cir6">
            <img id="pinkCir" src="images/circle7.png" alt="cir7">
            <img id="lightCir" src="images/circle8.png" alt="cir8">
        </section>
    </main>



</body>

</html>
