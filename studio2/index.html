<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time on the Trail</title>
    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">
</head>

<body>
    <h1>time on trail</h1>
    <h2>outdoor hiking mileage log</h2>

    <h3 class="month">month</h3>
    <h3 class="miles">miles</h3>
    <div class="chart">
        <img class="grid" src="images/grid.png" ; alt="grid">

        <section class="monthNames">
            <p>september</p>
            <p>october</p>
            <p>november</p>
            <p>december</p>
            <p>january</p>
            <p>february</p>
            <p>march</p>
            <p>april</p>
        </section>

        <section class="triangles">
            <img src="images/triangle1.png" ; alt="tri1">
            <img src="images/triangle2.png" ; alt="tri2">
            <img src="images/triangle3.png" ; alt="tri3">
            <img id="orangeTri" src="images/triangle4.png" ; alt="tri4">
            <img id="yellowTri" src="images/triangle5.png" ; alt="tri5">
            <img src="images/triangle6.png" ; alt="tri6">
            <img src="images/triangle7.png" ; alt="tri7">
            <img src="images/triangle8.png" ; alt="tri8">
        </section>
    </div>

    <section class="circles">
        <img src="images/circle1.png" ; alt="cir1">
        <img src="images/circle2.png" ; alt="cir2">
        <img src="images/circle3.png" ; alt="cir3">
        <img src="images/circle4.png" ; alt="cir4">
        <img src="images/circle5.png" ; alt="cir5">
        <img src="images/circle6.png" ; alt="cir6">
        <img src="images/circle7.png" ; alt="cir7">
        <img src="images/circle8.png" ; alt="cir8">
    </section>



</body>

</html>
